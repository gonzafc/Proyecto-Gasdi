version: '3.8'

services:
  backend:
    build: ./backend
    container_name: gasdi-backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    environment:
      - FLASK_ENV=development
  frontend:
    build: 
      context: ./frontend
    container_name: gasdi-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules           ##es para no sobreescribir los módulos de linux con los de la compu
    environment:
      - CHOKIDAR_USEPOLLING=true    ##es para que vite detecte cambios en los archivos
    depends_on:
      - backend                     ##primero levanta el back y dsp el front
